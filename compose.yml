services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: task_management
      POSTGRES_USER: task_user
      POSTGRES_PASSWORD: task_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_user -d task_management"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/task_management
      DB_USERNAME: task_user
      DB_PASSWORD: task_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:

