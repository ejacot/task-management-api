services:
  - type: web
    name: roomly-work
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: default
      - key: DATABASE_URL
        fromDatabase:
          name: roomly-postgres
          property: connectionString
      - key: ROOMLY_TOKEN_SECRET
        generateValue: true
      - key: ROOMLY_MAIL_ENABLED
        value: "true"
      - key: ROOMLY_SMTP_HOST
        value: smtp.gmail.com
      - key: ROOMLY_SMTP_PORT
        value: "587"
      - key: ROOMLY_SMTP_USERNAME
        value: eusebiujacot@gmail.com
      - key: ROOMLY_SMTP_PASSWORD
        sync: false
      - key: ROOMLY_MAIL_FROM
        value: eusebiujacot@gmail.com
      - key: ROOMLY_MAIL_FROM_NAME
        value: Roomly Work

databases:
  - name: roomly-postgres
    plan: free
    region: frankfurt
    databaseName: task_management
    user: task_user
    postgresMajorVersion: "17"
