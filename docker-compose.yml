services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: task_management
      POSTGRES_USER: task_user
      POSTGRES_PASSWORD: task_password
    ports:
      - "5432:5432"
    volumes:
      - roomly_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_user -d task_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/task_management
      DB_USERNAME: task_user
      DB_PASSWORD: task_password
      SPRING_PROFILES_ACTIVE: default
    ports:
      - "8080:8080"

volumes:
  roomly_postgres:
